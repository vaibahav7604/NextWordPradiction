<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Next Word Prediction</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">

<style>

body{
    background: linear-gradient(135deg,#1f4037,#99f2c8);
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    font-family: Arial, Helvetica, sans-serif;
}

.card{
    width:600px;
    border-radius:20px;
    box-shadow:0px 10px 30px rgba(0,0,0,0.3);
}

.title{
    font-weight:700;
    text-align:center;
}

.prediction-box{
    background:#f5f5f5;
    border-radius:10px;
    padding:15px;
}

</style>

</head>

<body>

<div class="card p-4">

<h2 class="title mb-4">Next Word Prediction</h2>

<form method="POST">

<div class="input-group mb-3">

<input type="text"
       name="text"
       class="form-control"
       placeholder="Type a sentence like 'king henry is'"
       required>

<button class="btn btn-dark">
Predict
</button>

</div>

</form>

{% if predictions %}

<div class="prediction-box">

<h5>Predicted Words</h5>

<ol>

{% for word, prob in predictions %}
<li>
<strong>{{word}}</strong>
<span class="text-muted">({{"%.2f"|format(prob*100)}}%)</span>
</li>
{% endfor %}

</ol>

</div>

{% endif %}

</div>

</body>
</html>
